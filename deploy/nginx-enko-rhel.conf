# Enko APK Hardening — Nginx (RHEL/Rocky/AlmaLinux)
# Placeholder template: setup-rhel.sh replaces @SERVER_NAME@ and @ENKO_INSTALL_DIR@.

upstream enko_backend {
    server 127.0.0.1:8036;
    keepalive 4;
}

server {
    listen 80 default_server;
    server_name @SERVER_NAME@;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 512m;
    client_body_timeout 120s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/javascript application/json text/xml application/xml image/svg+xml;

    # Static assets directly off disk
    location ~* \.(css|js|html|png|ico|woff2?)$ {
        root @ENKO_INSTALL_DIR@/web-console;
        expires 4h;
        etag on;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    # WebSocket for live job status (long-lived)
    location ~ ^/api/jobs/[^/]+/ws$ {
        proxy_pass http://enko_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://enko_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
    }

    # SPA root
    location / {
        root @ENKO_INSTALL_DIR@/web-console;
        try_files $uri $uri/ /index.html;
    }
}
