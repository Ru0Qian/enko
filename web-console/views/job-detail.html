<section id="view-job-detail" class="view-section">
<div class="pt-24 px-4 md:px-8 pb-12 max-w-7xl mx-auto">
  <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 mb-8">
    <div>
      <button class="inline-flex items-center gap-1.5 text-xs text-on-surface-variant hover:text-on-surface mb-4 transition-colors" onclick="navigateTo('jobs')">
        <span class="material-symbols-outlined text-sm">arrow_back</span>返回任务列表
      </button>
      <div class="flex flex-wrap items-center gap-3">
        <span class="material-symbols-outlined text-secondary text-2xl">task_alt</span>
        <h2 class="font-headline text-2xl font-bold tracking-tight">任务详情</h2>
        <span id="jobStatusBadge" class="px-3 py-0.5 rounded-full text-[10px] font-bold uppercase bg-slate-800 text-slate-400">idle</span>
        <span id="wsIndicator" class="w-2 h-2 rounded-full bg-slate-600 inline-block" title="实时通道未连接"></span>
      </div>
      <p class="text-sm text-on-surface-variant mt-2">日志、产物和报告都在当前任务下独立查看。</p>
    </div>
    <div class="flex flex-wrap items-center gap-3">
      <button id="jobRefreshBtn" class="inline-flex items-center gap-1.5 px-4 py-2 rounded-lg bg-surface-container-high border border-outline-variant/30 text-xs text-on-surface-variant hover:text-on-surface hover:bg-surface-bright transition-colors">
        <span class="material-symbols-outlined text-sm">refresh</span>刷新
      </button>
      <div id="jobDownloadArea" class="hidden">
        <a id="jobDownloadBtn" href="#" onclick="handleAuthDownload(event)" class="inline-flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-secondary to-secondary-container rounded-lg font-headline font-bold text-on-primary-fixed shadow-[0_0_20px_rgba(74,222,128,0.22)] hover:scale-[1.01] active:scale-95 transition-all text-xs no-underline">
          <span class="material-symbols-outlined text-base">download</span>
          <span>下载 APK</span>
        </a>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
    <section class="xl:col-span-2 glass-panel p-6 rounded-xl border border-outline-variant/20 shadow-xl">
      <div id="jobProgressContainer" class="hidden mb-5">
        <div class="flex items-center justify-between text-xs mb-2">
          <span id="jobProgressLabel" class="text-on-surface-variant font-medium">准备中...</span>
          <span id="jobProgressPct" class="text-primary font-bold font-mono">0%</span>
        </div>
        <div class="w-full bg-surface-container-low rounded-full h-2.5 overflow-hidden">
          <div id="jobProgressBar" class="bg-gradient-to-r from-primary to-secondary h-full rounded-full" style="width: 0%"></div>
        </div>
      </div>
      <pre id="jobLog" class="bg-slate-950 text-slate-400 text-xs font-mono p-4 rounded-lg overflow-x-auto max-h-[560px] min-h-[360px] border border-slate-800 whitespace-pre-wrap">选择一个任务后，这里会显示加固日志。</pre>
      <details class="mt-5 bg-surface-container-low rounded-lg border border-outline-variant/20 overflow-hidden">
        <summary class="cursor-pointer select-none px-4 py-3 text-xs font-bold text-on-surface-variant hover:text-on-surface">命令参数</summary>
        <pre id="jobCommandPreview" class="bg-slate-950 text-slate-400 text-[11px] font-mono p-4 overflow-x-auto max-h-56 whitespace-pre-wrap">选择一个任务后，这里会显示实际执行命令。</pre>
      </details>
    </section>

    <aside class="space-y-6">
      <section class="glass-panel p-5 rounded-xl border border-outline-variant/20 shadow-xl">
        <h3 class="text-sm font-headline font-bold text-on-surface mb-4">基础信息</h3>
        <div id="jobDetailPanel" class="grid grid-cols-1 gap-3 text-xs">
          <div><span class="text-slate-500">任务 ID：</span><span id="jobIdValue" class="text-slate-300 font-mono">-</span></div>
          <div><span class="text-slate-500">返回码：</span><span id="jobReturnCode" class="text-slate-300 font-mono">-</span></div>
          <div><span class="text-slate-500">运行时长：</span><span id="jobDuration" class="text-slate-300">-</span></div>
          <div><span class="text-slate-500">输出 APK：</span><span id="jobOutputApk" class="text-slate-300 break-all">-</span></div>
          <div><span class="text-slate-500">报告路径：</span><span id="jobReportPath" class="text-slate-300 break-all">-</span></div>
        </div>
      </section>
      <section class="glass-panel p-5 rounded-xl border border-outline-variant/20 shadow-xl">
        <h3 class="text-sm font-headline font-bold text-on-surface mb-4">执行摘要</h3>
        <div id="jobMetaList" class="space-y-2"></div>
      </section>
      <section class="glass-panel p-5 rounded-xl border border-outline-variant/20 shadow-xl">
        <h3 class="text-sm font-headline font-bold text-on-surface mb-4">保护报告</h3>
        <div id="jobReportSummaryList" class="space-y-2"></div>
      </section>
    </aside>
  </div>
</div>
</section>
